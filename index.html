<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시험 일정 공유 달력</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── REPLACE THIS WITH YOUR APPS SCRIPT URL ── */
  /* See setup guide: SETUP.md */

  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #9999aa;

    --c1: #4f8ef7;   /* 신청기간 */
    --c2: #f7c44f;   /* 필기시험 */
    --c3: #4ff79e;   /* 실기시험 */
    --c4: #f74fa8;   /* 정유나 */
    --c5: #1ec8c8;   /* 윤도현 */
    --c6: #f7714f;   /* 기타 */

    --radius: 10px;
    --ease: cubic-bezier(0.4,0,0.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* ───── LOCK ───── */
  #lock {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 26px; z-index: 9999;
  }
  .lock-eyebrow { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .lock-title {
    font-size: 32px; font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(135deg, #4f8ef7 0%, #1ec8c8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .lock-sub { font-size: 13px; color: var(--text-muted); text-align: center; line-height: 1.9; }
  #pin-dots { display: flex; gap: 14px; }
  .pin-dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid var(--border); transition: all 0.15s var(--ease);
  }
  .pin-dot.on { background: var(--c1); border-color: var(--c1); box-shadow: 0 0 8px var(--c1); }
  #pin-pad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; width: 220px; }
  .pkey {
    padding: 17px 0; border-radius: 9px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 20px; font-weight: 500;
    cursor: pointer; transition: background 0.12s var(--ease); font-family: 'DM Mono', monospace; user-select: none;
  }
  .pkey:hover { background: var(--border); }
  .pkey:active { transform: scale(0.94); }
  .pkey.sm { font-size: 13px; color: var(--text-muted); }
  #pin-err { color: #f75555; font-size: 12px; min-height: 18px; font-family: 'DM Mono', monospace; letter-spacing: 1px; }
  .shake { animation: shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

  /* ───── APP ───── */
  #app { display: none; }
  #app.on { display: block; }

  /* header */
  .hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 17px 24px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 200;
    background: rgba(15,15,19,0.96); backdrop-filter: blur(14px);
  }
  .hdr-title { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; }
  .hdr-title span { color: var(--c1); }
  .hdr-right { display: flex; gap: 10px; align-items: center; }

  /* sync badge */
  .sync-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace;
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; transition: background 0.3s; }
  .sync-dot.ok   { background: var(--c3); }
  .sync-dot.busy { background: var(--c2); animation: blink 1s infinite; }
  .sync-dot.err  { background: #f75555; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* buttons */
  .btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; display: inline-flex; align-items: center; gap: 5px; transition: filter 0.15s; }
  .btn-blue { background: var(--c1); color: #fff; }
  .btn-blue:hover { filter: brightness(1.12); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-red { background: transparent; border: 1px solid #f7555540; color: #f75555; }
  .btn-red:hover { background: #f7555520; }

  /* legend */
  .legend { display: flex; flex-wrap: wrap; gap: 10px; padding: 11px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* nav */
  .cal-nav { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 18px 24px 8px; }
  .nav-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
  .nav-btn:hover { background: var(--border); }
  .month-lbl { font-size: 19px; font-weight: 700; letter-spacing: -0.5px; min-width: 155px; text-align: center; }

  /* grid */
  .cal-wrap { padding: 0 12px 24px; overflow-x: auto; }
  .cal { width: 100%; border-collapse: collapse; min-width: 680px; }
  .cal thead th { padding: 7px 4px 5px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); font-family: 'DM Mono', monospace; font-weight: 500; text-align: center; }
  .cal thead th:first-child { color: #f99; }
  .cal thead th:last-child  { color: #99c; }

  .cell { vertical-align: top; padding: 3px; height: 108px; border: 1px solid var(--border); }
  .cell.other { opacity: 0.25; }
  .cell.today { background: rgba(79,142,247,0.05); }
  .day-n { font-size: 11px; font-weight: 500; color: var(--text-dim); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; flex-shrink: 0; }
  .day-n.today-n { background: var(--c1); color: #fff; border-radius: 50%; }
  .col-0 .day-n { color: #f99; }
  .col-6 .day-n { color: #99c; }

  /* bars */
  .bars { display: flex; flex-direction: column; gap: 2px; margin-top: 1px; }
  .bar {
    height: 17px; font-size: 10px; font-weight: 500; padding: 0 5px;
    display: flex; align-items: center; overflow: hidden; white-space: nowrap;
    cursor: pointer; border-radius: 3px; user-select: none;
    transition: opacity 0.12s, filter 0.12s;
  }
  .bar span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar.r-open  { border-radius: 3px 0 0 3px; margin-right: -3px; }
  .bar.l-open  { border-radius: 0 3px 3px 0; margin-left:  -3px; padding-left: 2px; }
  .bar.both-open { border-radius: 0; margin: 0 -3px; padding-left: 2px; }
  .bar:hover { filter: brightness(1.18) !important; }
  .bar.hi { outline: 1.5px solid rgba(255,255,255,0.45); filter: brightness(1.1); }
  .bar.dim { opacity: 0.18 !important; }
  .more { font-size: 9px; color: var(--text-muted); padding: 1px 4px; cursor: pointer; font-family: 'DM Mono', monospace; border-radius: 3px; }
  .more:hover { background: var(--surface2); }

  /* ───── TOOLTIP ───── */
  #tip {
    position: fixed; z-index: 6000; pointer-events: none;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; max-width: 260px; min-width: 170px;
    font-size: 12px; box-shadow: 0 8px 28px rgba(0,0,0,0.55); display: none;
  }
  #tip.show { display: block; }
  .tip-name { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .tip-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; color: var(--text-dim); }
  .tip-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .tip-hr { border: none; border-top: 1px solid var(--border); margin: 7px 0; }
  .tip-linked-hd { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; font-family: 'DM Mono', monospace; }
  .tip-lrow { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }

  /* ───── MODAL ───── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000;
    display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 26px; width: 420px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    animation: mIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes mIn { from{transform:scale(0.91) translateY(10px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
  .modal-ttl { font-size: 17px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.5px; }
  .fg { margin-bottom: 15px; }
  .fg label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; font-family: 'DM Mono', monospace; }
  .fi, .fs {
    width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; outline: none;
    font-family: 'Noto Sans KR', sans-serif; transition: border-color 0.15s;
  }
  .fi:focus, .fs:focus { border-color: var(--c1); }
  .fs option { background: var(--surface2); }
  .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .sub-btns { display: flex; gap: 8px; }
  .sub-btn {
    flex: 1; padding: 8px 6px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text-dim); font-size: 12px; cursor: pointer;
    text-align: center; transition: all 0.14s; font-family: 'Noto Sans KR', sans-serif;
  }
  .sub-btn.active { border-color: var(--c1); background: rgba(79,142,247,0.1); color: var(--c1); font-weight: 600; }
  .modal-acts { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* ───── TOAST ───── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 100px; padding: 11px 20px; font-size: 13px; z-index: 9000;
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
    display: flex; align-items: center; gap: 7px; white-space: nowrap;
    box-shadow: 0 4px 18px rgba(0,0,0,0.4);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ══ LOCK ══ -->
<div id="lock">
  <div class="lock-eyebrow">Exam Planner · 공유 스터디 달력</div>
  <div class="lock-title">시험 일정 달력</div>
  <div class="lock-sub">비밀번호를 입력하면 일정을 추가·수정할 수 있어요.<br>모든 변경사항은 10분마다 자동으로 동기화됩니다.</div>
  <div id="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div id="pin-pad">
    <button class="pkey" onclick="pp('1')">1</button><button class="pkey" onclick="pp('2')">2</button><button class="pkey" onclick="pp('3')">3</button>
    <button class="pkey" onclick="pp('4')">4</button><button class="pkey" onclick="pp('5')">5</button><button class="pkey" onclick="pp('6')">6</button>
    <button class="pkey" onclick="pp('7')">7</button><button class="pkey" onclick="pp('8')">8</button><button class="pkey" onclick="pp('9')">9</button>
    <button class="pkey sm" onclick="pc()">CLR</button><button class="pkey" onclick="pp('0')">0</button><button class="pkey sm" onclick="pb()">⌫</button>
  </div>
  <div id="pin-err"></div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <header class="hdr">
    <div class="hdr-title">시험 <span>일정 달력</span></div>
    <div class="hdr-right">
      <div class="sync-badge"><div class="sync-dot ok" id="sdot"></div><span id="slbl">동기화됨</span></div>
      <button class="btn btn-ghost" onclick="manualSync()" style="padding:7px 12px;font-size:12px;">↻ 새로고침</button>
      <button class="btn btn-blue" onclick="openAdd()">+ 일정 추가</button>
    </div>
  </header>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--c1)"></div>신청기간</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c2)"></div>필기시험</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c3)"></div>실기시험</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c4)"></div>정유나</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c5)"></div>윤도현</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c6)"></div>기타</div>
  </div>

  <div class="cal-nav">
    <button class="nav-btn" onclick="nav(-1)">‹</button>
    <div class="month-lbl" id="mlbl"></div>
    <button class="nav-btn" onclick="nav(1)">›</button>
    <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px;" onclick="goToday()">오늘</button>
  </div>

  <div class="cal-wrap">
    <table class="cal">
      <thead><tr>
        <th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th>
      </tr></thead>
      <tbody id="cbody"></tbody>
    </table>
  </div>
</div>

<!-- ══ MODAL ══ -->
<div class="overlay" id="modal-ov">
  <div class="modal">
    <div class="modal-ttl" id="modal-ttl">일정 추가</div>
    <div class="fg">
      <label>시험 이름 *</label>
      <input class="fi" id="f-name" placeholder="예: 산업안전기사" list="f-names" autocomplete="off">
      <datalist id="f-names"></datalist>
    </div>
    <div class="fg">
      <label>종류 *</label>
      <select class="fs" id="f-cat" onchange="catChange()">
        <option value="0">신청기간</option><option value="1">필기시험</option>
        <option value="2">실기시험</option><option value="3">정유나</option>
        <option value="4">윤도현</option><option value="5">기타</option>
      </select>
    </div>
    <div class="fg" id="sub-fg" style="display:none">
      <label>신청 종류</label>
      <div class="sub-btns">
        <div class="sub-btn active" id="sb-w" onclick="setSub('w')">📝 필기 신청</div>
        <div class="sub-btn" id="sb-p" onclick="setSub('p')">🔧 실기 신청</div>
        <div class="sub-btn" id="sb-b" onclick="setSub('b')">📋 필기+실기</div>
      </div>
    </div>
    <div class="fg">
      <label>날짜 범위 *</label>
      <div class="date-row">
        <input class="fi" id="f-start" type="date">
        <input class="fi" id="f-end"   type="date">
      </div>
    </div>
    <div class="fg"><label>장소 / 지역</label><input class="fi" id="f-place" placeholder="예: 서울, 부산"></div>
    <div class="fg"><label>시험 회차</label><input class="fi" id="f-round" placeholder="예: 1회차, 2회차"></div>
    <div class="fg"><label>메모</label><input class="fi" id="f-memo" placeholder="추가 메모"></div>
    <div class="modal-acts">
      <button class="btn btn-red" id="del-btn" style="display:none" onclick="delEv()">삭제</button>
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-blue" onclick="saveEv()">저장</button>
    </div>
  </div>
</div>

<!-- ══ TOOLTIP ══ -->
<div id="tip"></div>

<!-- ══ TOAST ══ -->
<div id="toast"><span id="t-icon"></span><span id="t-msg"></span></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ★ 여기에 Apps Script 웹 앱 URL을 붙여넣으세요
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const API_URL = 'https://script.google.com/macros/s/AKfycbyFnbScfdwwa47nPT-bpt9tlkawt3CwtQ3g-7gV3VyerxWLlCJ8-RcMJloaDktiKqtU2g/exec';

const PASS  = '1234';
const CATS  = ['신청기간','필기시험','실기시험','정유나','윤도현','기타'];
const CCOLORS = ['#4f8ef7','#f7c44f','#4ff79e','#f74fa8','#1ec8c8','#f7714f'];
const CTEXTS  = ['#fff','#111','#111','#fff','#fff','#fff'];
const SUBLBL  = { w:'필기신청', p:'실기신청', b:'필기+실기신청' };

let evs = [], editId = null, curSub = 'w';
let cy, cm;
const today = new Date();

// ──── INIT ────
(function init() {
  cy = today.getFullYear(); cm = today.getMonth();
  loadEvs();
  setInterval(loadEvs, 10 * 60 * 1000); // 10분마다 자동 동기화
})();

// ──── API ────
async function loadEvs() {
  setSync('busy','동기화 중...');
  try {
    const r = await fetch(API_URL + '?action=get', { cache: 'no-store' });
    const data = await r.json();
    if (data.ok) {
      evs = data.events;
      renderCal();
      setSync('ok','동기화됨 · ' + new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
    } else throw new Error(data.error);
  } catch(e) {
    setSync('err','연결 실패');
    console.error(e);
  }
}

async function saveEvs() {
  setSync('busy','저장 중...');
  try {
    const r = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'set', events: evs })
    });
    const data = await r.json();
    if (!data.ok) throw new Error(data.error);
    setSync('ok','저장됨 · ' + new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSync('err','저장 실패');
    toast('⚠️','저장에 실패했습니다. 네트워크를 확인해주세요.');
    console.error(e);
  }
}

function manualSync() { loadEvs(); }

function setSync(state, lbl) {
  document.getElementById('sdot').className = 'sync-dot ' + state;
  document.getElementById('slbl').textContent = lbl;
}

// ──── PIN ────
let buf = '';
function pp(d) {
  if (buf.length >= 4) return;
  buf += d; updDots();
  if (buf.length === 4) {
    setTimeout(() => {
      if (buf === PASS) {
        document.getElementById('lock').style.display = 'none';
        document.getElementById('app').classList.add('on');
      } else {
        document.getElementById('pin-err').textContent = '비밀번호가 틀렸습니다';
        document.getElementById('pin-dots').classList.add('shake');
        setTimeout(() => { document.getElementById('pin-dots').classList.remove('shake'); buf=''; updDots(); document.getElementById('pin-err').textContent=''; }, 650);
      }
    }, 120);
  }
}
function pb() { buf = buf.slice(0,-1); updDots(); }
function pc() { buf = ''; updDots(); }
function updDots() { for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('on', i<buf.length); }

// ──── CALENDAR ────
function renderCal() {
  const MN = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('mlbl').textContent = cy + '년 ' + MN[cm];

  const fd = new Date(cy, cm, 1).getDay();
  const dim = new Date(cy, cm+1, 0).getDate();
  const dip = new Date(cy, cm, 0).getDate();

  let cells = [];
  for(let i=fd-1;i>=0;i--) cells.push({d:dip-i, m:cm-1, y:cm===0?cy-1:cy, o:true});
  for(let d=1;d<=dim;d++) cells.push({d, m:cm, y:cy, o:false});
  while(cells.length%7) { const nx=cells.length-fd-dim+1; cells.push({d:nx, m:cm+1, y:cm===11?cy+1:cy, o:true}); }

  const layout = buildLayout(cells);
  const tb = document.getElementById('cbody');
  tb.innerHTML = '';

  for(let r=0;r<cells.length/7;r++) {
    const tr = document.createElement('tr');
    for(let c=0;c<7;c++) {
      const cell = cells[r*7+c];
      const ds = fd2(cell.y, cell.m, cell.d);
      const isTd = !cell.o && cell.y===today.getFullYear() && cell.m===today.getMonth() && cell.d===today.getDate();
      const td = document.createElement('td');
      td.className = 'cell col-'+c + (cell.o?' other':'') + (isTd?' today':'');

      const dn = document.createElement('div');
      dn.className = 'day-n' + (isTd?' today-n':'');
      dn.textContent = cell.d;
      td.appendChild(dn);

      const bd = document.createElement('div'); bd.className='bars';
      const items = (layout[ds]||[]).slice().sort((a,b)=>a.slot-b.slot);
      const MAX=3; const seen=new Set(); let shown=0;

      items.forEach(it => {
        if(seen.has(it.slot)) return; seen.add(it.slot);
        if(shown>=MAX) return; shown++;
        const ev = evs.find(e=>e.id===it.evId); if(!ev) return;
        const bar = document.createElement('div');
        const p = it.pos;
        bar.className = 'bar' + (p==='start'?' r-open':p==='end'?' l-open':p==='middle'?' both-open':'');
        bar.dataset.evid = ev.id;
        bar.style.background = CCOLORS[ev.cat];
        bar.style.color = CTEXTS[ev.cat];
        const lbl = document.createElement('span');
        if(p==='start'||p==='single') {
          const cl = ev.cat===0&&ev.sub ? SUBLBL[ev.sub] : CATS[ev.cat];
          lbl.textContent = cl + ' · ' + ev.name;
        }
        bar.appendChild(lbl);
        bar.addEventListener('mouseenter', e=>showTip(e,ev.id));
        bar.addEventListener('mousemove',  e=>moveTip(e));
        bar.addEventListener('mouseleave', hideTip);
        bar.addEventListener('click', ()=>openEdit(ev.id));
        bd.appendChild(bar);
      });

      const extra = new Set(items.map(i=>i.slot)).size - MAX;
      if(extra>0) { const mb=document.createElement('div'); mb.className='more'; mb.textContent='+'+extra+' 더보기'; bd.appendChild(mb); }
      td.appendChild(bd); tr.appendChild(td);
    }
    tb.appendChild(tr);
  }
}

function buildLayout(cells) {
  const layout={};
  cells.forEach(c=>layout[fd2(c.y,c.m,c.d)]=[]);
  const sorted=[...evs].sort((a,b)=>a.start.localeCompare(b.start));
  const slotEnd=[];
  sorted.forEach(ev=>{
    let slot=0; while(slotEnd[slot]&&slotEnd[slot]>=ev.start) slot++;
    slotEnd[slot]=ev.end;
    let cur=new Date(ev.start+'T00:00:00');
    const end=new Date(ev.end+'T00:00:00');
    while(cur<=end){
      const ds=cur.toISOString().slice(0,10);
      if(layout[ds]!==undefined){
        const s=ev.start===ev.end, iS=ds===ev.start, iE=ds===ev.end;
        layout[ds].push({evId:ev.id, slot, pos:s?'single':iS?'start':iE?'end':'middle'});
      }
      cur.setDate(cur.getDate()+1);
    }
  });
  return layout;
}

function fd2(y,m,d){ return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }

// ──── TOOLTIP ────
function showTip(e, evId) {
  const ev = evs.find(x=>x.id===evId); if(!ev) return;
  const linked = evs.filter(x=>x.name===ev.name&&x.id!==evId&&[0,1,2].includes(x.cat));
  const cl = ev.cat===0&&ev.sub ? SUBLBL[ev.sub] : CATS[ev.cat];

  let h = `<div class="tip-name">${ev.name}</div>`;
  if(ev.round) h+=`<div class="tip-row" style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text-muted)">${ev.round}</div>`;
  h+=`<div class="tip-row"><div class="tip-dot" style="background:${CCOLORS[ev.cat]}"></div><b>${cl}</b></div>`;
  h+=`<div class="tip-row" style="font-size:11px;font-family:'DM Mono',monospace">📅 ${ev.start} ~ ${ev.end}</div>`;
  if(ev.place) h+=`<div class="tip-row">📍 ${ev.place}</div>`;
  if(ev.memo)  h+=`<div class="tip-row">💬 ${ev.memo}</div>`;
  if(linked.length) {
    h+=`<hr class="tip-hr"><div class="tip-linked-hd">🔗 연결된 일정</div>`;
    linked.forEach(lk=>{
      const ll=lk.cat===0&&lk.sub?SUBLBL[lk.sub]:CATS[lk.cat];
      h+=`<div class="tip-lrow"><div class="tip-dot" style="background:${CCOLORS[lk.cat]}"></div><span style="font-size:11px">${ll}</span><span style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-left:auto;padding-left:8px">${lk.start}~${lk.end}</span></div>`;
    });
  }
  const tip=document.getElementById('tip'); tip.innerHTML=h; tip.classList.add('show');
  moveTip(e);

  document.querySelectorAll('.bar').forEach(b=>{
    const bid=b.dataset.evid;
    const me=bid===String(evId), lk=linked.some(l=>String(l.id)===bid);
    b.classList.toggle('hi', me||lk);
    b.classList.toggle('dim', !(me||lk));
  });
}
function moveTip(e) {
  const t=document.getElementById('tip');
  let x=e.clientX+14, y=e.clientY+14;
  if(x+t.offsetWidth>window.innerWidth-10) x=e.clientX-t.offsetWidth-10;
  if(y+t.offsetHeight>window.innerHeight-10) y=e.clientY-t.offsetHeight-10;
  t.style.left=x+'px'; t.style.top=y+'px';
}
function hideTip() {
  document.getElementById('tip').classList.remove('show');
  document.querySelectorAll('.bar').forEach(b=>b.classList.remove('hi','dim'));
}

// ──── MODAL ────
function catChange() {
  document.getElementById('sub-fg').style.display = +document.getElementById('f-cat').value===0 ? 'block' : 'none';
}
function setSub(s) {
  curSub=s; ['w','p','b'].forEach(k=>document.getElementById('sb-'+k).classList.toggle('active',k===s));
}
function updDatalist() {
  const names=[...new Set(evs.map(e=>e.name))];
  document.getElementById('f-names').innerHTML = names.map(n=>`<option value="${n}">`).join('');
}

function openAdd() {
  editId=null;
  document.getElementById('modal-ttl').textContent='일정 추가';
  document.getElementById('del-btn').style.display='none';
  ['f-name','f-place','f-round','f-memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-cat').value='0';
  document.getElementById('f-start').value=''; document.getElementById('f-end').value='';
  curSub='w'; setSub('w'); catChange(); updDatalist();
  document.getElementById('modal-ov').classList.add('open');
}
function openEdit(id) {
  const ev=evs.find(e=>e.id===id); if(!ev) return;
  editId=id;
  document.getElementById('modal-ttl').textContent='일정 수정';
  document.getElementById('del-btn').style.display='block';
  document.getElementById('f-name').value=ev.name;
  document.getElementById('f-cat').value=String(ev.cat);
  document.getElementById('f-start').value=ev.start; document.getElementById('f-end').value=ev.end;
  document.getElementById('f-place').value=ev.place||''; document.getElementById('f-round').value=ev.round||''; document.getElementById('f-memo').value=ev.memo||'';
  curSub=ev.sub||'w'; setSub(curSub); catChange(); updDatalist();
  document.getElementById('modal-ov').classList.add('open');
}
function closeModal() { document.getElementById('modal-ov').classList.remove('open'); }

async function saveEv() {
  const name=document.getElementById('f-name').value.trim();
  const cat=+document.getElementById('f-cat').value;
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value;
  const place=document.getElementById('f-place').value.trim();
  const round=document.getElementById('f-round').value.trim();
  const memo=document.getElementById('f-memo').value.trim();
  if(!name||!start||!end){toast('⚠️','시험 이름과 날짜를 입력해주세요');return;}
  if(start>end){toast('⚠️','종료일이 시작일보다 앞설 수 없어요');return;}
  const obj={name,cat,start,end,place,round,memo};
  if(cat===0) obj.sub=curSub;
  if(editId!==null){const i=evs.findIndex(e=>e.id===editId);if(i!==-1)evs[i]={id:editId,...obj};}
  else evs.push({id:Date.now(),...obj});
  closeModal(); renderCal();
  await saveEvs();
  toast('✓', editId?'수정되었습니다':'일정이 추가되었습니다');
}
async function delEv() {
  if(editId===null) return;
  if(!confirm('이 일정을 삭제할까요?')) return;
  evs=evs.filter(e=>e.id!==editId);
  closeModal(); renderCal();
  await saveEvs(); toast('🗑','삭제되었습니다');
}

// ──── NAV ────
function nav(d) {
  cm+=d; if(cm>11){cm=0;cy++;} if(cm<0){cm=11;cy--;} renderCal();
}
function goToday(){cy=today.getFullYear();cm=today.getMonth();renderCal();}

// ──── TOAST ────
let _tt;
function toast(icon,msg){
  document.getElementById('t-icon').textContent=icon; document.getElementById('t-msg').textContent=msg;
  const el=document.getElementById('toast'); el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2700);
}

// ──── KEYBOARD ────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
  if(document.getElementById('lock').style.display!=='none'||document.getElementById('lock').style.display==='') {
    if(e.key>='0'&&e.key<='9') pp(e.key);
    if(e.key==='Backspace') pb();
  }
});
document.getElementById('modal-ov').addEventListener('click',e=>{if(e.target.id==='modal-ov')closeModal();});
</script>
